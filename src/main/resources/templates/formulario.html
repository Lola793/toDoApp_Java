<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Tarea</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<h2 class="titulo-centrado">Crear nueva tarea</h2>

<form th:action="@{/tareas/guardar}" th:object="${tarea}" method="post">

    <label for="titulo">Título</label>
    <input type="text" id="titulo" th:field="*{titulo}" required />

    <label for="descripcion">Descripción</label>
    <textarea id="descripcion" th:field="*{descripcion}" rows="4"></textarea>

    <label for="fechaLimite">Fecha límite</label>
    <input type="date" id="fechaLimite" th:field="*{fechaLimite}" required />

    <label for="categoria">Categoría</label>
    <select id="categoria" th:field="*{categoria}" required>
        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
    </select>

    <button type="submit">Guardar tarea</button>

</form>

</body>
</html>
